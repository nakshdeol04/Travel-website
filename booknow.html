<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now</title>
    <link rel="stylesheet" href="booknow.css">
</head>
<body>
    <header><div id="logo">
        <img src="logo.jpg" alt="logo">
    </div>
    <nav class="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#about">about</a></li>
          <li><a href="index.html#destinations">destinations</a></li>
          <li><a href="index.html#hotels">Hotels</a></li>
          <li><a href="index.html#activites">activites</a></li>
        </ul>
    </nav>
</header>
<main>
    <div id="hero.jpg">
        <div id="center-box">
            <form id="form"
                onsubmit="showMessage(event)">
                <h1>Book Now</h1>

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="location">location:</label>
                        <input type="tel" id="location" name="location" placeholder="Enter location ">
                    </div>
                </div>

                <button type="submit">Submit</button>
            </form>
        </div>
        <img src="hero.jpg" alt="Hero Image">
    </div>
<script>
function showMessage(event) {
  event.preventDefault();
  alert("Form Submitted Successfully ✅");
}
</script>

</main>
</body>
</html>
